function formatCompact(n) {
  n = Number(n) || 0;
  if (n >= 1000000) return (n / 1000000).toFixed(1) + "M";
  if (n >= 1000) return (n / 1000).toFixed(1) + "K";
  return String(n);
}
function formatCurrency(n) {
  n = parseFloat(n) || 0;
  return "$" + n.toLocaleString("en-US", { maximumFractionDigits: 0 });
}
function timeAgo(iso) {
  if (!iso) return "";
  const diff = Date.now() - new Date(iso).getTime();
  const mins = Math.floor(diff / 60000);
  if (mins < 1) return "just now";
  if (mins < 60) return `${mins}m ago`;
  const hrs = Math.floor(mins / 60);
  if (hrs < 24) return `${hrs}h ago`;
  const days = Math.floor(hrs / 24);
  return `${days}d ago`;
}
function calcLeadScore(a) {
  let score = 0;
  const f = Number(a.followers) || 0;
  score += Math.min(20, Math.log10(f + 1) * 4);
  score += (Number(a.relationshipScore) || 0) * 2;
  score += a.replied ? 15 : 0;
  score += Math.min(20, (Number(a.previousPurchases) || 0) * 10);
  const stageBonus = { intro: 2, value: 6, negotiation: 10, won: 15, lost: 0 };
  score += stageBonus[a.stage] || 0;
  const pri = { high: 10, medium: 5, low: 2 };
  score += pri[a.priority] || 0;
  return Math.max(0, Math.min(100, Math.round(score)));
}
function leadCategory(score) {
  if (score >= 90) return "Hot";
  if (score >= 70) return "Warm";
  if (score >= 40) return "Medium";
  return "Cold";
}
function leadColor(cat) {
  if (cat === "Hot") return "#fb7185";
  if (cat === "Warm") return "#f97316";
  if (cat === "Medium") return "#38bdf8";
  return "#71717a";
}
function getMonthlyRevenue(artists) {
  const now = new Date();
  const months = [];
  for (let i = 5; i >= 0; i--) {
    const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
    months.push({ key: `${d.getFullYear()}-${d.getMonth()}`, label: d.toLocaleString("en-US", { month: "short" }), revenue: 0 });
  }
  artists.forEach((a) => {
    if (a.stage === "won" && a.dateClosed) {
      const d = new Date(a.dateClosed);
      const key = `${d.getFullYear()}-${d.getMonth()}`;
      const m = months.find((mo) => mo.key === key);
      if (m) m.revenue += parseFloat(a.saleAmount) || 0;
    }
  });
  return months;
}
function suggestFollowUp(a) {
  if (!a.dateContacted) return null;
  const start = new Date(a.dateContacted);
  const now = new Date();
  const daysSince = Math.floor((now - start) / 86400000);
  const next = FOLLOWUP_SCHEDULE.find((s) => s.day > daysSince);
  if (!next) return null;
  const date = new Date(start);
  date.setDate(date.getDate() + next.day);
  return { date: date.toISOString().slice(0, 10), label: next.label, day: next.day };
}
function quickDmTemplate(a) {
  const stage = a.stage;
  const name = a.name || "there";
  const genre = a.genre || "your sound";
  const city = a.location || "";
  if (stage === "intro") return `Hey ${name}! Been bumping your ${genre} stuff${city ? ` out of ${city}` : ""} — I produce and wanted to send over a free beat that might fit. Let me know if you want me to send it!`;
  if (stage === "value") return `Hey ${name}, just checking if you got a chance to listen to that beat I sent — happy to send a couple more options if it's not quite right.`;
  if (stage === "negotiation") return `Hey ${name}, totally hear you on the price — let's find a number that works for both of us. What were you thinking?`;
  if (stage === "won") return `Hey ${name}, thanks again for working with me — sending the final files now. Let's keep cooking!`;
  return `Hey ${name}, no worries if the timing wasn't right before — keeping the door open if you ever want to work together.`;
}
async function copyToClipboard(text) {
  try {
    if (navigator.clipboard && navigator.clipboard.writeText) { await navigator.clipboard.writeText(text); return true; }
  } catch (e) {}
  try {
    const ta = document.createElement("textarea");
    ta.value = text; ta.style.position = "fixed"; ta.style.opacity = "0";
    document.body.appendChild(ta); ta.focus(); ta.select();
    document.execCommand("copy"); document.body.removeChild(ta);
    return true;
  } catch (e) { return false; }
}
function buildAutoTimelineEntries(prev, next) {
  const entries = [];
  const now = new Date().toISOString();
  if (prev.stage !== next.stage) entries.push({ id: uid(), type: "stage", text: `Moved to ${STAGES.find((s) => s.id === next.stage)?.label}`, ts: now });
  if (!prev.replied && next.replied) entries.push({ id: uid(), type: "reply", text: "Marked as replied", ts: now });
  if (prev.priceOffered !== next.priceOffered && next.priceOffered) entries.push({ id: uid(), type: "offer", text: `Price offered: $${next.priceOffered}`, ts: now });
  if (prev.counterOffer !== next.counterOffer && next.counterOffer) entries.push({ id: uid(), type: "offer", text: `Counter offer received: $${next.counterOffer}`, ts: now });
  if (prev.nextFollowUp !== next.nextFollowUp && next.nextFollowUp) entries.push({ id: uid(), type: "followup", text: `Follow-up scheduled for ${next.nextFollowUp}`, ts: now });
  if (prev.stage !== "won" && next.stage === "won" && next.saleAmount) entries.push({ id: uid(), type: "deal", text: `Deal closed: $${next.saleAmount} (${next.licenseType || "license n/a"})`, ts: now });
  if (!prev.freeBeatSent && next.freeBeatSent) entries.push({ id: uid(), type: "dm", text: "Free beat sent", ts: now });
  if (!prev.freeLoopSent && next.freeLoopSent) entries.push({ id: uid(), type: "dm", text: "Free loop sent", ts: now });
  return entries;
}

  const rows = artists.map((a) => {
    const row = {};
    CSV_FIELDS.forEach((k) => { let v = a[k]; if (typeof v === "boolean") v = v ? "TRUE" : "FALSE"; row[k] = v ?? ""; });
    return row;
  });
  const csv = Papa.unparse(rows);
  const blob = new Blob([csv], { type: "text/csv;charset=utf-8;" });
  const url = URL.createObjectURL(blob);
  const link = document.createElement("a");
  link.href = url; link.download = `rl-crm-export-${todayStr()}.csv`;
  document.body.appendChild(link); link.click(); document.body.removeChild(link);
  URL.revokeObjectURL(url);
}
function parseCSVFile(file, onDone, onError) {
  Papa.parse(file, {
    header: true, skipEmptyLines: true,
    complete: (results) => {
      try {
        const imported = results.data.map((row) => {
          const a = emptyArtist();
          CSV_FIELDS.forEach((k) => { if (row[k] !== undefined) a[k] = row[k]; });
          CSV_BOOL_FIELDS.forEach((k) => { a[k] = String(a[k]).toUpperCase() === "TRUE"; });
          CSV_NUM_FIELDS.forEach((k) => { a[k] = Number(a[k]) || 0; });
          a.id = uid();
          a.timeline = [{ id: uid(), type: "note", text: "Imported from CSV", ts: new Date().toISOString() }];
          return a;
        }).filter((a) => a.name);
        onDone(imported);
      } catch (e) { onError(); }
    },
    error: () => onError(),
  });
}

async function supabaseGetRow(config) {
  const res = await fetch(`${config.url}/rest/v1/crm_store?id=eq.main&select=data,updated_at`, {
    headers: { apikey: config.anonKey, Authorization: `Bearer ${config.anonKey}` },
  });
  if (!res.ok) throw new Error(`Sync read failed (${res.status})`);
  const rows = await res.json();
  return rows && rows[0] ? rows[0] : null;
}
async function supabasePutRow(config, payload) {
  const res = await fetch(`${config.url}/rest/v1/crm_store`, {
    method: "POST",
    headers: { apikey: config.anonKey, Authorization: `Bearer ${config.anonKey}`, "Content-Type": "application/json", Prefer: "resolution=merge-duplicates" },
    body: JSON.stringify([{ id: "main", data: payload, updated_at: new Date().toISOString() }]),
  });
  if (!res.ok) throw new Error(`Sync write failed (${res.status})`);
  return true;
}

const AVATAR_COLORS = ["#dc2626", "#2563eb", "#d97706", "#7c3aed", "#0d9488", "#db2777", "#16a34a", "#4f46e5"];
function avatarColor(name) {
  const str = name || "?";
  let hash = 0;
  for (let i = 0; i < str.length; i++) hash = (hash * 31 + str.charCodeAt(i)) >>> 0;
  return AVATAR_COLORS[hash % AVATAR_COLORS.length];
}
function getInitials(name) {
  if (!name || !name.trim()) return "?";
  const parts = name.trim().split(/\s+/);
  if (parts.length === 1) return parts[0].slice(0, 2).toUpperCase();
  return (parts[0][0] + parts[1][0]).toUpperCase();
}

function AnimatedNumber({ value, formatFn, duration = 700 }) {
  const [display, setDisplay] = useState(0);
  const fromRef = useRef(0);
  useEffect(() => {
    const from = fromRef.current;
    const target = Number(value) || 0;
    const start = performance.now();
    let raf;
    function tick(now) {
      const progress = Math.min(1, (now - start) / duration);
      const eased = 1 - Math.pow(1 - progress, 3);
      setDisplay(from + (target - from) * eased);
      if (progress < 1) raf = requestAnimationFrame(tick);
      else fromRef.current = target;
    }
    raf = requestAnimationFrame(tick);
    return () => cancelAnimationFrame(raf);
  }, [value]);
  return <>{formatFn ? formatFn(display) : Math.round(display)}</>;
}

function CommandPalette({ open, onClose, items }) {
  const [q, setQ] = useState(""); const [idx, setIdx] = useState(0); const ref = useRef(null);
  useEffect(() => { if (open) { setQ(""); setIdx(0); setTimeout(() => ref.current?.focus(), 10); } }, [open]);
  if (!open) return null;
  const filtered = items.filter((it) => it.label.toLowerCase().includes(q.toLowerCase())).slice(0, 8);
  function handleKey(e) {
    if (e.key === "ArrowDown") { e.preventDefault(); setIdx((i) => Math.min(i + 1, filtered.length - 1)); }
    else if (e.key === "ArrowUp") { e.preventDefault(); setIdx((i) => Math.max(i - 1, 0)); }
    else if (e.key === "Enter") { e.preventDefault(); const it = filtered[idx]; if (it) { it.action(); onClose(); } }
    else if (e.key === "Escape") onClose();
  }
  return (
    <div className="fixed inset-0 z-50 flex items-start justify-center pt-24 p-4">
      <div className="absolute inset-0 bg-black/60" onClick={onClose} />
      <div className="rl-scale-in relative bg-zinc-900 border border-zinc-800 rounded-xl w-full max-w-lg overflow-hidden shadow-2xl">
        <div className="flex items-center gap-2 px-4 py-3 border-b border-zinc-800">
          <Ic name="search" size={16} className="text-zinc-500" />
          <input ref={ref} value={q} onChange={(e) => { setQ(e.target.value); setIdx(0); }} onKeyDown={handleKey} placeholder="Type a command or search artists..." className="flex-1 bg-transparent text-sm text-zinc-100 placeholder-zinc-500 focus:outline-none" />
          <kbd className="text-xs text-zinc-600 font-mono border border-zinc-700 rounded px-1.5">esc</kbd>
        </div>
        <div className="max-h-80 overflow-y-auto py-1">
          {filtered.length === 0 ? <p className="text-sm text-zinc-500 px-4 py-6 text-center">No matches.</p> : filtered.map((it, i) => (
            <button key={it.id} onClick={() => { it.action(); onClose(); }} className={`w-full flex items-center justify-between gap-2 px-4 py-2.5 text-left text-sm ${i === idx ? "bg-zinc-800 text-blue-400" : "text-zinc-300 hover:bg-zinc-800"}`}>
              <span>{it.label}</span>{it.sub && <span className="text-xs text-zinc-500 font-mono">{it.sub}</span>}
            </button>
          ))}
        </div>
      </div>
    </div>
  );
}

function ConnectModal({ open, onClose, config, onSave, onDisconnect, syncStatus, lastSyncedAt }) {
  const [url, setUrl] = useState(config?.url || "");
  const [key, setKey] = useState(config?.anonKey || "");
  const [testing, setTesting] = useState(false);
  const [testError, setTestError] = useState("");
  useEffect(() => { setUrl(config?.url || ""); setKey(config?.anonKey || ""); setTestError(""); }, [open]);
  if (!open) return null;

  async function handleSave() {
    if (!url.trim() || !key.trim()) { setTestError("Both fields are required."); return; }
    setTesting(true); setTestError("");
    const cleanUrl = url.trim().replace(/\/$/, "");
    try {
      const res = await fetch(`${cleanUrl}/rest/v1/crm_store?select=id&limit=1`, { headers: { apikey: key.trim(), Authorization: `Bearer ${key.trim()}` } });
      if (!res.ok) throw new Error(`Connection test failed (${res.status}). Check the table is named "crm_store" and that the anon key has a policy allowing access to it.`);
      onSave({ url: cleanUrl, anonKey: key.trim() });
    } catch (e) {
      setTestError(e.message || "Couldn't connect. Double check the URL and key.");
    } finally { setTesting(false); }
  }

  return (
    <div className="fixed inset-0 z-50 flex items-center justify-center p-0 md:p-4">
      <div className="rl-modal-backdrop absolute inset-0 bg-black/70" onClick={onClose} />
      <div className="rl-modal-sheet rl-scale-in relative bg-zinc-900 border border-zinc-800 rounded-2xl w-full max-w-md p-5 space-y-4">
        <div className="rl-modal-sheet-handle w-full flex justify-center -mt-2 mb-1"><div className="w-10 h-1 rounded-full bg-zinc-700" /></div>
        <div className="flex items-center justify-between">
          <h2 className="font-display text-xl text-zinc-50">Cross-device sync</h2>
          <button onClick={onClose} className="text-zinc-500 hover:text-zinc-200"><Ic name="x" size={20} /></button>
        </div>
        <p className="text-xs text-zinc-500">Paste your Supabase project URL and anon public key. Free setup takes about 5 minutes.</p>
        <Field label="Project URL"><input className={inputCls} placeholder="https://xxxx.supabase.co" value={url} onChange={(e) => setUrl(e.target.value)} /></Field>
        <Field label="Anon public key"><input className={inputCls} placeholder="eyJhbGciOi..." value={key} onChange={(e) => setKey(e.target.value)} /></Field>
        {testError && <p className="text-sm text-red-400">{testError}</p>}
        {config && (
          <div className="flex items-center justify-between text-xs text-zinc-500 font-mono bg-zinc-800 rounded-md px-3 py-2">
            <span>Status: {syncStatus === "synced" ? "Connected" : syncStatus === "syncing" ? "Syncing..." : syncStatus === "error" ? "Connection error" : "Not connected"}</span>
            {lastSyncedAt && <span>Last: {timeAgo(lastSyncedAt)}</span>}
          </div>
        )}
        <div className="flex justify-between gap-2">
          {config ? <button onClick={onDisconnect} className="px-3 py-2 text-sm rounded-md border border-red-800 text-red-400 hover:bg-red-950">Disconnect</button> : <span />}
          <div className="flex gap-2 ml-auto">
            <button onClick={onClose} className="px-4 py-2 text-sm rounded-md border border-zinc-700 text-zinc-300 hover:bg-zinc-800">Close</button>
            <button onClick={handleSave} disabled={testing} className="px-4 py-2 text-sm rounded-md bg-red-600 text-white font-medium hover:bg-red-500">{testing ? "Testing..." : "Save & connect"}</button>
          </div>
        </div>
      </div>
    </div>
  );
}

    return (
      <div className="flex items-center justify-between gap-3 bg-zinc-800 rounded-lg px-3 py-2.5">
        <button onClick={() => onOpenArtist(a)} className="text-left flex-1 min-w-0">
          <div className="text-sm text-zinc-100 truncate">{a.name || "Unnamed artist"}</div>
          <div className="text-xs text-zinc-500">{STAGES.find((s) => s.id === a.stage)?.label}{a.nextFollowUp ? ` · ${a.nextFollowUp}` : ""}</div>
        </button>
        {suggestion ? (
          <button onClick={() => onSetFollowUp(a.id, suggestion.date, suggestion.label)} className="text-xs font-medium bg-zinc-700 hover:bg-zinc-600 text-zinc-200 px-2.5 py-1.5 rounded-md flex-none whitespace-nowrap">Suggest: Day {suggestion.day}</button>
        ) : (
          <div className="flex gap-1.5 flex-none">
            <button onClick={() => onCompleteFollowUp(a.id)} className="text-zinc-400 hover:text-green-400" title="Mark done"><Ic name="checkCircle" size={16} /></button>
            <button onClick={() => onQuickFollowUp(a.id, 7)} className="text-zinc-400 hover:text-blue-400" title="Push 7 days"><Ic name="clock" size={16} /></button>
          </div>
        )}
      </div>
    );
  }
  return (
    <div className="p-4 md:p-6 space-y-6">
      <div><h3 className="font-display text-lg text-red-400 mb-2">Overdue ({overdue.length})</h3>{overdue.length === 0 ? <p className="text-sm text-zinc-500">Nothing overdue. Nice.</p> : <div className="space-y-2">{overdue.map((a) => <Row key={a.id} a={a} />)}</div>}</div>
      <div><h3 className="font-display text-lg text-blue-400 mb-2">Due today ({dueToday.length})</h3>{dueToday.length === 0 ? <p className="text-sm text-zinc-500">Nothing due today.</p> : <div className="space-y-2">{dueToday.map((a) => <Row key={a.id} a={a} />)}</div>}</div>
      <div><h3 className="font-display text-lg text-zinc-200 mb-2">Upcoming ({upcoming.length})</h3>{upcoming.length === 0 ? <p className="text-sm text-zinc-500">Nothing scheduled.</p> : <div className="space-y-2">{upcoming.slice(0, 10).map((a) => <Row key={a.id} a={a} />)}</div>}</div>
      <div><h3 className="font-display text-lg text-zinc-200 mb-2">Needs a follow-up date ({needsSchedule.length})</h3>{needsSchedule.length === 0 ? <p className="text-sm text-zinc-500">Everyone active has a follow-up scheduled.</p> : <div className="space-y-2">{needsSchedule.map((a) => <Row key={a.id} a={a} showSuggestion />)}</div>}</div>
    </div>
  );
}

function AnalyticsView({ artists }) {
  const won = artists.filter((a) => a.stage === "won");
  const lost = artists.filter((a) => a.stage === "lost");
  const revenue = won.reduce((s, a) => s + (parseFloat(a.saleAmount) || 0), 0);
  const conversionRate = won.length + lost.length ? Math.round((won.length / (won.length + lost.length)) * 100) : 0;
  const avgDeal = won.length ? revenue / won.length : 0;
  const byGenre = {};
  won.forEach((a) => { const g = a.genre || "Unspecified"; byGenre[g] = (byGenre[g] || 0) + (parseFloat(a.saleAmount) || 0); });
  const topGenreEntry = Object.entries(byGenre).sort((a, b) => b[1] - a[1])[0];
  const monthly = getMonthlyRevenue(artists);
  const funnelStages = ["intro", "value", "negotiation", "won"];
  const funnelCounts = funnelStages.map((id) => ({ id, label: STAGES.find((s) => s.id === id).label, color: STAGES.find((s) => s.id === id).color, count: artists.filter((a) => a.stage === id).length }));
  const maxCount = Math.max(1, ...funnelCounts.map((c) => c.count));
  const pipelineValue = ["intro", "value", "negotiation"].map((id) => ({ id, label: STAGES.find((s) => s.id === id).label, color: STAGES.find((s) => s.id === id).color, value: artists.filter((a) => a.stage === id).reduce((s, a) => s + (parseFloat(a.estimatedDealValue) || parseFloat(a.priceOffered) || 0), 0) }));
  const maxValue = Math.max(1, ...pipelineValue.map((c) => c.value));
  return (
    <div className="p-4 md:p-6 space-y-6">
      <div className="grid grid-cols-2 md:grid-cols-4 gap-3">
        <StatCard icon="dollarSign" label="Total revenue" numericValue={revenue} formatFn={formatCurrency} accent />
        <StatCard icon="target" label="Conversion rate" numericValue={conversionRate} formatFn={(v) => `${Math.round(v)}%`} sub={`${won.length} won · ${lost.length} lost`} />
        <StatCard icon="trendingUp" label="Avg deal size" numericValue={avgDeal} formatFn={formatCurrency} />
        <StatCard icon="flame" label="Top genre" value={topGenreEntry ? topGenreEntry[0] : "—"} sub={topGenreEntry ? formatCurrency(topGenreEntry[1]) : "No deals yet"} accent />
      </div>
      <div className="bg-zinc-900 border border-zinc-800 rounded-xl p-4">
        <h3 className="font-display text-lg text-zinc-100 mb-3">Monthly revenue trend</h3>
        {revenue > 0 ? <MiniBarChart data={monthly} valueKey="revenue" labelKey="label" color="#dc2626" formatValue={formatCurrency} /> : <p className="text-sm text-zinc-500 py-10 text-center">No closed deals yet.</p>}
      </div>
      <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
        <div className="bg-zinc-900 border border-zinc-800 rounded-xl p-4">
          <h3 className="font-display text-lg text-zinc-100 mb-3">Pipeline funnel</h3>
          <p className="text-xs text-zinc-600 mb-3">Current artists sitting at each stage.</p>
          <div className="space-y-2">{funnelCounts.map((c) => (
            <div key={c.id} className="flex items-center gap-3">
              <span className="w-28 text-xs text-zinc-400 font-mono shrink-0">{c.label}</span>
              <div className="flex-1 bg-zinc-800 rounded h-6 overflow-hidden"><GrowBar widthPercent={(c.count / maxCount) * 100} color={c.color} /></div>
              <span className="w-8 text-right text-xs font-mono text-zinc-400">{c.count}</span>
            </div>
          ))}</div>
        </div>
        <div className="bg-zinc-900 border border-zinc-800 rounded-xl p-4">
          <h3 className="font-display text-lg text-zinc-100 mb-3">Estimated pipeline value by stage</h3>
          <p className="text-xs text-zinc-600 mb-3">Open deal value still in play, by stage.</p>
          <div className="space-y-2">{pipelineValue.map((c) => (
            <div key={c.id} className="flex items-center gap-3">
              <span className="w-28 text-xs text-zinc-400 font-mono shrink-0">{c.label}</span>
              <div className="flex-1 bg-zinc-800 rounded h-6 overflow-hidden"><GrowBar widthPercent={(c.value / maxValue) * 100} color={c.color} /></div>
              <span className="w-16 text-right text-xs font-mono text-zinc-400">{formatCurrency(c.value)}</span>
            </div>
          ))}</div>
        </div>
      </div>
    </div>
  );
}

    { id: "dashboard", label: "Home", icon: "dashboard" },
    { id: "pipeline", label: "Pipeline", icon: "pipeline" },

  return (

      className="md:hidden fixed bottom-0 inset-x-0 z-30 bg-zinc-950/95 border-t border-zinc-800 flex items-stretch"

function App() {
  const [artists, setArtists] = useState([]);
  const [loaded, setLoaded] = useState(false);
  const [view, setView] = useState("dashboard");
  const [search, setSearch] = useState("");
  const [filterStage, setFilterStage] = useState("all");
  const [filterGenre, setFilterGenre] = useState("all");
  const [filterPriority, setFilterPriority] = useState("all");
  const [collapsed, setCollapsed] = useState(false);
  const [mobileOpen, setMobileOpen] = useState(false);
  const [modalArtist, setModalArtist] = useState(null);
  const [modalIsNew, setModalIsNew] = useState(false);
  const [dismissedNotifs, setDismissedNotifs] = useState(new Set());
  const [notifOpen, setNotifOpen] = useState(false);
  const [dataMenuOpen, setDataMenuOpen] = useState(false);
  const [cmdOpen, setCmdOpen] = useState(false);
  const [toast, setToast] = useState("");
  const [syncConfig, setSyncConfig] = useState(null);
  const [syncStatus, setSyncStatus] = useState("idle");
  const [lastSyncedAt, setLastSyncedAt] = useState(null);
  const [connectOpen, setConnectOpen] = useState(false);
  const fileInputRef = useRef(null);
  const toastTimer = useRef(null);
  const dismissedRef = useRef(dismissedNotifs);
  dismissedRef.current = dismissedNotifs;

  function showToast(msg) {
    setToast(msg);
    if (toastTimer.current) clearTimeout(toastTimer.current);
    toastTimer.current = setTimeout(() => setToast(""), 2200);
  }

  useEffect(() => {
    try {
      const raw = localStorage.getItem(LOCAL_KEY);
      if (raw) { const parsed = JSON.parse(raw); setArtists(parsed.artists || []); setDismissedNotifs(new Set(parsed.dismissedNotifs || [])); }
    } catch (e) { console.error("Local load failed", e); }
    try {
      const cfgRaw = localStorage.getItem(CONFIG_KEY);
      if (cfgRaw) setSyncConfig(JSON.parse(cfgRaw));
    } catch (e) {}
    setLoaded(true);
  }, []);

  useEffect(() => {
    function onKey(e) { if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === "k") { e.preventDefault(); setCmdOpen((v) => !v); } }
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, []);

  async function pullFromCloud(config) {
    setSyncStatus("syncing");
    try {
      const row = await supabaseGetRow(config);
      if (row && row.data) {
        const localRaw = localStorage.getItem(LOCAL_KEY);
        const localUpdated = localRaw ? JSON.parse(localRaw).updated_at : null;
        if (!localUpdated || new Date(row.updated_at) > new Date(localUpdated)) {
          setArtists(row.data.artists || []);
          setDismissedNotifs(new Set(row.data.dismissedNotifs || []));
          localStorage.setItem(LOCAL_KEY, JSON.stringify({ ...row.data, updated_at: row.updated_at }));
        }
      }
      setSyncStatus("synced");
      setLastSyncedAt(new Date().toISOString());
    } catch (e) {
      console.error("Sync pull failed", e);
      setSyncStatus("error");
    }
  }

  useEffect(() => {
    if (!syncConfig || !loaded) return;
    pullFromCloud(syncConfig);
    const interval = setInterval(() => pullFromCloud(syncConfig), 30000);
    function onFocus() { pullFromCloud(syncConfig); }
    window.addEventListener("focus", onFocus);
    return () => { clearInterval(interval); window.removeEventListener("focus", onFocus); };
  }, [syncConfig, loaded]);

  async function persistArtists(next, dismissedOverride) {
    setArtists(next);
    const dismissed = dismissedOverride || dismissedRef.current;
    const payload = { artists: next, dismissedNotifs: Array.from(dismissed) };
    const stamped = { ...payload, updated_at: new Date().toISOString() };
    try {
      localStorage.setItem(LOCAL_KEY, JSON.stringify(stamped));
    } catch (e) {
      console.error("Local save failed", e);
      return false;
    }
    if (!syncConfig) return true;
    setSyncStatus("syncing");
    try {
      await supabasePutRow(syncConfig, payload);
      setSyncStatus("synced");
      setLastSyncedAt(new Date().toISOString());
    } catch (e) {
      console.error("Cloud sync failed", e);
      setSyncStatus("error");
    }
    return true;
  }

  function dismissNotification(id) {
    setDismissedNotifs((prev) => {
      const next = new Set(prev);
      next.add(id);
      persistArtists(artists, next);
      return next;
    });
  }

  function handleOpenArtist(artist) { setModalArtist(artist); setModalIsNew(false); }
  function handleAddArtist() { setModalArtist(emptyArtist()); setModalIsNew(true); }

  async function handleSaveArtist(form) {
    const exists = artists.some((a) => a.id === form.id);
    let next;
    if (exists) {
      const prev = artists.find((a) => a.id === form.id);
      const autoEntries = buildAutoTimelineEntries(prev, form);
      const updated = { ...form, timeline: [...autoEntries, ...(form.timeline || [])] };
      next = artists.map((a) => (a.id === form.id ? updated : a));
    } else {
      const created = { ...form, timeline: [{ id: uid(), type: "note", text: "Profile created", ts: new Date().toISOString() }, ...(form.timeline || [])] };
      next = [created, ...artists];
    }
    await persistArtists(next);
    setModalArtist(null);
    showToast(exists ? "Artist updated" : "Artist added");
  }

  async function handleDeleteArtist(id) {
    const a = artists.find((x) => x.id === id);
    await persistArtists(artists.filter((x) => x.id !== id));
    setModalArtist(null);
    showToast(`Removed ${a?.name || "artist"}`);
  }

  async function handleMoveStage(id, newStage) {
    const a = artists.find((x) => x.id === id);
    if (!a || a.stage === newStage) return;
    const entry = { id: uid(), type: "stage", text: `Moved to ${STAGES.find((s) => s.id === newStage)?.label}`, ts: new Date().toISOString() };
    const next = artists.map((x) => (x.id === id ? { ...x, stage: newStage, timeline: [entry, ...(x.timeline || [])] } : x));
    await persistArtists(next);
    showToast(`Moved ${a.name || "artist"} to ${STAGES.find((s) => s.id === newStage)?.label}`);
  }

  async function handleQuickFollowUp(id, days) {
    const date = new Date(); date.setDate(date.getDate() + days);
    const iso = date.toISOString().slice(0, 10);
    const entry = { id: uid(), type: "followup", text: `Follow-up scheduled for ${iso}`, ts: new Date().toISOString() };
    const next = artists.map((x) => (x.id === id ? { ...x, nextFollowUp: iso, timeline: [entry, ...(x.timeline || [])] } : x));
    await persistArtists(next);
    showToast(`Follow-up set for ${iso}`);
  }

  async function handleSetFollowUpDate(id, iso, label) {
    const entry = { id: uid(), type: "followup", text: `Follow-up scheduled for ${iso}${label ? ` (${label})` : ""}`, ts: new Date().toISOString() };
    const next = artists.map((x) => (x.id === id ? { ...x, nextFollowUp: iso, timeline: [entry, ...(x.timeline || [])] } : x));
    await persistArtists(next);
    showToast("Follow-up scheduled");
  }

  async function handleCompleteFollowUp(id) {
    const a = artists.find((x) => x.id === id);
    const entry = { id: uid(), type: "followup", text: "Follow-up completed", ts: new Date().toISOString() };
    const next = artists.map((x) => (x.id === id ? { ...x, nextFollowUp: "", timeline: [entry, ...(x.timeline || [])] } : x));
    await persistArtists(next);
    showToast(`Marked follow-up with ${a?.name || "artist"} as done`);
  }

  function handleQuickCopyHandle(a) { copyToClipboard(`@${(a.igHandle || "").replace(/^@/, "")}`); showToast("Instagram handle copied"); }

  async function handleQuickCopyDM(a) {
    copyToClipboard(quickDmTemplate(a));
    const entry = { id: uid(), type: "dm", text: "Quick DM template copied", ts: new Date().toISOString() };
    const next = artists.map((x) => (x.id === a.id ? { ...x, timeline: [entry, ...(x.timeline || [])] } : x));
    await persistArtists(next);
    showToast("DM copied to clipboard");
  }

  function handleQuickOpenIG(a) {
    const url = a.igUrl || (a.igHandle ? `https://instagram.com/${a.igHandle.replace(/^@/, "")}` : "");
    if (!url) { showToast("No Instagram link saved for this artist"); return; }
    window.open(url, "_blank");
  }

  async function handleLoadSample() { await persistArtists(sampleArtists()); showToast("Sample data loaded"); }
  async function handleClearAll() { if (!window.confirm("Clear all artists? This can't be undone.")) return; await persistArtists([]); showToast("All data cleared"); }
  function handleExportCSV() { if (artists.length === 0) { showToast("Nothing to export yet"); return; } exportCSV(artists); showToast("CSV exported"); }
  function handleImportClick() { fileInputRef.current?.click(); }
  function handleImportFileChange(e) {
    const file = e.target.files?.[0];
    if (!file) return;
    parseCSVFile(file, async (imported) => { await persistArtists([...imported, ...artists]); showToast(`Imported ${imported.length} artist${imported.length === 1 ? "" : "s"}`); }, () => showToast("Couldn't read that CSV file"));
    e.target.value = "";
  }

  function handleConnectSave(cfg) {
    setSyncConfig(cfg);
    localStorage.setItem(CONFIG_KEY, JSON.stringify(cfg));
    setConnectOpen(false);
    showToast("Connected — syncing now");
    persistArtists(artists);
  }
  function handleDisconnect() {
    setSyncConfig(null);
    localStorage.removeItem(CONFIG_KEY);
    setSyncStatus("idle");
    setConnectOpen(false);
    showToast("Disconnected — saving locally only");
  }

  const genres = useMemo(() => Array.from(new Set(artists.map((a) => a.genre).filter(Boolean))), [artists]);

  const filteredArtists = useMemo(() => artists.filter((a) => {
    if (search) { const haystack = `${a.name} ${a.igHandle} ${a.genre} ${a.location}`.toLowerCase(); if (!haystack.includes(search.toLowerCase())) return false; }
    if (filterStage !== "all" && a.stage !== filterStage) return false;
    if (filterGenre !== "all" && a.genre !== filterGenre) return false;
    if (filterPriority !== "all" && a.priority !== filterPriority) return false;
    return true;
  }), [artists, search, filterStage, filterGenre, filterPriority]);

  const stats = useMemo(() => {
    const total = artists.length;
    const activeCount = artists.filter((a) => a.stage !== "won" && a.stage !== "lost").length;
    const repliesReceived = artists.filter((a) => a.replied).length;
    const contacted = artists.filter((a) => a.dateContacted).length;
    const responseRate = contacted ? Math.round((repliesReceived / contacted) * 100) : 0;
    const dealsClosed = artists.filter((a) => a.stage === "won").length;
    const revenue = artists.filter((a) => a.stage === "won").reduce((s, a) => s + (parseFloat(a.saleAmount) || 0), 0);
    const today = todayStr();
    const followUpsDue = artists.filter((a) => a.nextFollowUp && a.nextFollowUp <= today && a.stage !== "won" && a.stage !== "lost").length;
    const hotLeads = artists.filter((a) => calcLeadScore(a) >= 90).length;
    return { total, active: activeCount, repliesReceived, responseRate, dealsClosed, revenue, followUpsDue, hotLeads };
  }, [artists]);

  const notifications = useMemo(() => {
    const today = todayStr();
    const list = [];
    artists.forEach((a) => {
      const score = calcLeadScore(a);
      if (a.replied && !dismissedNotifs.has(`reply-${a.id}`)) list.push({ id: `reply-${a.id}`, type: "reply", typeLabel: NOTIF_LABELS.reply, artist: a, text: `${a.name || "An artist"} replied to your message`, ts: a.lastContact || a.createdAt });
      if (score >= 90 && !dismissedNotifs.has(`hot-${a.id}`)) list.push({ id: `hot-${a.id}`, type: "hot", typeLabel: NOTIF_LABELS.hot, artist: a, text: `${a.name || "An artist"} is now a hot lead (${score})`, ts: a.createdAt });
      if (a.nextFollowUp && a.nextFollowUp < today && a.stage !== "won" && a.stage !== "lost" && !dismissedNotifs.has(`overdue-${a.id}`)) list.push({ id: `overdue-${a.id}`, type: "overdue", typeLabel: NOTIF_LABELS.overdue, artist: a, text: `Follow-up with ${a.name || "an artist"} is overdue`, ts: a.nextFollowUp });
      if (a.stage === "negotiation" && !dismissedNotifs.has(`negotiation-${a.id}`)) list.push({ id: `negotiation-${a.id}`, type: "negotiation", typeLabel: NOTIF_LABELS.negotiation, artist: a, text: `${a.name || "An artist"} is in active negotiation`, ts: a.lastContact || a.createdAt });
    });
    return list.sort((x, y) => (x.ts < y.ts ? 1 : -1));
  }, [artists, dismissedNotifs]);

  const recentActivity = useMemo(() => {
    const all = artists.flatMap((a) => (a.timeline || []).map((t) => ({ ...t, artistName: a.name })));
    return all.sort((x, y) => (x.ts < y.ts ? 1 : -1)).slice(0, 8);
  }, [artists]);

  const commandItems = useMemo(() => {
    const navItems = [
      { id: "nav-dashboard", label: "Go to Dashboard", action: () => setView("dashboard") },
      { id: "nav-pipeline", label: "Go to Pipeline", action: () => setView("pipeline") },
      { id: "nav-artists", label: "Go to Artists", action: () => setView("artists") },
      { id: "nav-tasks", label: "Go to Tasks", action: () => setView("tasks") },
      { id: "nav-analytics", label: "Go to Analytics", action: () => setView("analytics") },
      { id: "add-artist", label: "Add new artist", action: handleAddArtist },
      { id: "open-notifs", label: "Open notifications", action: () => setNotifOpen(true) },
      { id: "export-csv", label: "Export artists to CSV", action: handleExportCSV },
      { id: "open-sync", label: "Open sync settings", action: () => setConnectOpen(true) },
    ];
    const artistItems = artists.map((a) => ({ id: `artist-${a.id}`, label: `Open ${a.name || "Unnamed artist"}`, sub: a.genre, action: () => handleOpenArtist(a) }));
    return [...navItems, ...artistItems];
  }, [artists]);

  const cardHandlers = { onCopyHandle: handleQuickCopyHandle, onCopyDM: handleQuickCopyDM, onOpenIG: handleQuickOpenIG, onQuickFollowUp: handleQuickFollowUp };

  if (!loaded) return (
    <div className="h-screen w-full bg-zinc-950 flex items-center justify-center">
      <span className="rl-pop-in font-display text-4xl text-red-500" style={{ animation: "rlPopIn 0.5s cubic-bezier(0.34,1.56,0.64,1) both, rlGlowPulseRed 2s ease-in-out infinite" }}>R$L</span>
    </div>
  );

  return (
    <div className="h-screen w-full bg-zinc-950 text-zinc-200 flex font-sans overflow-hidden">
      <Sidebar view={view} setView={setView} collapsed={collapsed} mobileOpen={mobileOpen} setMobileOpen={setMobileOpen} stats={stats} />
      <div className="flex-1 flex flex-col min-w-0">
        <Topbar search={search} setSearch={setSearch} onAddArtist={handleAddArtist} setMobileOpen={setMobileOpen} collapsed={collapsed} setCollapsed={setCollapsed}
          notifications={notifications} notifOpen={notifOpen} setNotifOpen={setNotifOpen} onDismissNotif={dismissNotification} onOpenArtist={handleOpenArtist}
          dataMenuOpen={dataMenuOpen} setDataMenuOpen={setDataMenuOpen} onExportCSV={handleExportCSV} onImportClick={handleImportClick} onClearAll={handleClearAll}
          fileInputRef={fileInputRef} onImportFileChange={handleImportFileChange} syncStatus={syncConfig ? syncStatus : "idle"} onOpenConnect={() => setConnectOpen(true)} />
        <main className="flex-1 overflow-y-auto overflow-x-hidden" style={{ paddingBottom: "calc(env(safe-area-inset-bottom) + 76px)" }}>
          {artists.length === 0 && (
            <div className="px-4 md:px-6 pt-4 rl-fade-in">
              <div className="bg-zinc-900 border border-dashed border-zinc-700 rounded-xl p-4 flex items-center justify-between flex-wrap gap-3">
                <p className="text-sm text-zinc-400">Your CRM is empty. Add your first artist, load sample data, or import a CSV.</p>
                <div className="flex gap-2 flex-wrap">
                  <button onClick={handleImportClick} className="text-xs font-medium bg-zinc-800 hover:bg-zinc-700 text-zinc-200 px-3 py-1.5 rounded-md">Import CSV</button>
                  <button onClick={handleLoadSample} className="text-xs font-medium bg-zinc-800 hover:bg-zinc-700 text-zinc-200 px-3 py-1.5 rounded-md">Load sample data</button>
                  <button onClick={handleAddArtist} className="rl-glow-hover-red text-xs font-medium bg-red-600 hover:bg-red-500 text-white px-3 py-1.5 rounded-md">Add artist</button>
                </div>
              </div>
            </div>
          )}
          <div key={view} className="rl-fade-in">
            {view === "dashboard" && <DashboardView artists={artists} stats={stats} recentActivity={recentActivity} onOpenArtist={handleOpenArtist} />}
            {view === "pipeline" && <PipelineView artists={filteredArtists} onOpenArtist={handleOpenArtist} onMoveStage={handleMoveStage} cardHandlers={cardHandlers} />}
            {view === "artists" && (
              <ArtistsView artists={filteredArtists} onOpenArtist={handleOpenArtist} onMoveStage={handleMoveStage} cardHandlers={cardHandlers}
                filterStage={filterStage} setFilterStage={setFilterStage} filterGenre={filterGenre} setFilterGenre={setFilterGenre}
                filterPriority={filterPriority} setFilterPriority={setFilterPriority} genres={genres} />
            )}
            {view === "tasks" && <TasksView artists={artists} onOpenArtist={handleOpenArtist} onSetFollowUp={handleSetFollowUpDate} onCompleteFollowUp={handleCompleteFollowUp} onQuickFollowUp={handleQuickFollowUp} />}
            {view === "analytics" && <AnalyticsView artists={artists} />}
          </div>
        </main>
      </div>
      <BottomTabBar view={view} setView={setView} />
      <FAB onClick={handleAddArtist} />
      {modalArtist && <ArtistModal artist={modalArtist} isNew={modalIsNew} onClose={() => setModalArtist(null)} onSave={handleSaveArtist} onDelete={handleDeleteArtist} />}
      <CommandPalette open={cmdOpen} onClose={() => setCmdOpen(false)} items={commandItems} />
      <ConnectModal open={connectOpen} onClose={() => setConnectOpen(false)} config={syncConfig} onSave={handleConnectSave} onDisconnect={handleDisconnect} syncStatus={syncStatus} lastSyncedAt={lastSyncedAt} />
      {toast && <div className="rl-fade-in fixed z-50 left-1/2 -translate-x-1/2 bg-zinc-800 border border-zinc-700 text-zinc-100 text-sm px-4 py-2 rounded-lg shadow-2xl" style={{ bottom: "calc(env(safe-area-inset-bottom) + 88px)" }}>{toast}</div>}
    </div>
  );
}

if (window.__rlBootTimer) clearTimeout(window.__rlBootTimer);
ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
